gh pr create --repo marcuss/couplesapp-android --head mobile-e2e/maestro-poc --base main --title "test: Maestro POC (Android) + sanity flow" --body "Adds initial Maestro flow (.maestro/sanity.yaml). Separate PR will add GH Actions nightly (2 AM COT) to run on emulator and publish report to S3 under mobile/android/YYYY-MM-DD/."
